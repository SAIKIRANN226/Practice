- name: mongodb-component
  hosts: mongodb
  become: yes
  tasks:
  - name: Copy MongoDB repo file
    ansible.builtin.copy:
      dest: /etc/yum.repos.d/mongo.repo
      content: |
         [mongodb-org-4.2]
         name=MongoDB Repository
         baseurl=https://repo.mongodb.org/yum/redhat/$releasever/mongodb-org/4.2/x86_64/
         gpgcheck=0
         enabled=1

  - name: mongodb-org
    ansible.builtin.package:
      name: mongodb-org
      state: present

  - name: Enabling and starting mongod
    ansible.builtin.systemd:
      name: mongod
      enabled: yes
      state: started

  - name: Update bindIp to allow remote access using replace module
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '^(\s*)bindIp:\s*127\.0\.0\.1'
      replace: '\1bindIp: 0.0.0.0'

  - name: Restarting mongodb
    ansible.builtin.service:
      name: mongodb
      state: restarted
