- name: mongodb module
  hosts: mongodb
  become: yes
  tasks:
  - name: mongodb copy
    ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

  - name: installing mongodb-org
    ansible.builtin.dnf:
        name: mongodb.repo
        state: latest

  - name: enabling mongodb
    ansible.builtin.service:
        name: mongod
        state: enabled

  - name: starting mongodb
    ansible.builtin.service:
        name: mongod
        state: started

