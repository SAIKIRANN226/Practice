- name: catalogue component
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable default Node.js module
    ansible.builtin.command: dnf module disable nodejs -y

  - name: Enable Node.js 18 module
    ansible.builtin.command: dnf module enable nodejs:18 -y

  - name: Installing nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: Check if roboshop user exists
    ansible.builtin.getent:
      database: passwd
      key: roboshop
    register: roboshop_user
    ignore_errors: true

  - name: Create roboshop user if not exists
    ansible.builtin.user:
      name: roboshop
      state: present
    when: roboshop_user.failed

    

