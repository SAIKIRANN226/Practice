- name: catalogue module
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable Node.js module
    ansible.builtin.command: dnf module disable nodejs -y
    become: yes

  - name: Enable Node.js 18 module
    ansible.builtin.command: dnf module enable nodejs:18 -y
    become: yes

  - name: install nodejs
    ansible.builtin.command: dnf install nodejs -y
    become: yes

  - name: Create a user roboshop
    ansible.builtin.user:
    name: roboshop
  
  - name: Create an app directory
    ansible.builtin.file:
        path: /app
        state: directory

  - name: Download code
    ansible.builtin.get_url:
    url: https://roboshop-builds.s3.amazonaws.com/catalogue.zip
    dest: /tmp/

  - name: unzip
    ansible.builtin.unarchive:
    src: /tmp/catalogue.zip
    dest: /app
    remote_src: yes
