- name: catalogue module
  hosts: catalogue
  become: yes
  tasks:
  - name: Disable Node.js module
    ansible.builtin.command: dnf module disable nodejs -y
    become: yes

  - name: Enable Node.js 18 module
    ansible.builtin.command: dnf module enable nodejs:18 -y
    become: yes

  - name: install nodejs
    ansible.builtin.command: dnf install nodejs -y
    become: yes

  - name: Create a user roboshop
    ansible.builtin.user:
        name: roboshop
  
  - name: Create an app directory
    ansible.builtin.file:
        path: /app
        state: directory

  - name: Download code
    ansible.builtin.get_url:
        url: https://roboshop-builds.s3.amazonaws.com/catalogue.zip
        dest: /tmp/

  - name: unzip
    ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

  - name: Installing npm dependencies
    community.general.npm:
        path: /app

  - name: Copy catalogue.service file
    ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

  - name: Reload systemd manager configuration
    ansible.builtin.command: systemctl daemon-reload

  - name: Started catalogue
    ansible.builtin.service:
        name: catalogue
        state: started
        enabled: yes

  - name: Copy mongodb.repo
    ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb-org-shell
    ansible.builtin.dnf:
        name: mongodb-org-shell
        state: present

  - name: get the categories count
    ansible.builtin.command:  mongo --host mongodb.daws76s.online --quiet --eval 'db = db.getSiblingDB("catalogue"); db.products.count()'  # ansible.builtin.command is nothing but running above big command in the server,take that command output in a register with a variable name(product_count)
    register: product_count # The above large command is to get the catagories count and registering the product count in a variable register

  - name: print the count
    ansible.builtin.debug:
      msg: "product count: {{product_count}}"

  - name: load catalogue data
    ansible.builtin.command: mongo --host 172.31.24.199 < /app/schema/catalogue.js
    when: product_count.stdout == "0" # Keep double quotes that means if product count is "0" then only run and load the catagories otherwise ignore

  - name: start and enable catalogue
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes


  
